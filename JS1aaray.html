<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array JavaScript</title>
</head>
<body>
    
    <h1>Arrays in Console</h1>

    <script>
        let numberAS = [4, 2, 6, 8, 7];

        numberAS.sort((a,b) => a - b );
        console.log(numberAS);

        let numberDS = [4, 2, 6, 8, 7];

        numberDS.sort((a,b) => b - a );
        console.log(numberDS);
    </script>
</body>
</html>
